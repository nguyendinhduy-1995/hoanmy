<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hỗ Trợ Trực Page - Hoàn Mỹ CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #B8860B;
            --pink-light: #FFF3D6;
            --green: #00B894;
            --green-light: #D5F5E3;
            --gold: #F39C12;
            --gold-light: #FFF3CD;
            --red: #E74C3C;
            --red-light: #FFE0E0;
            --blue: #3498DB;
            --blue-light: #D6EAF8;
            --purple: #7C4DFF;
            --purple-light: #EDE7F6;
            --bg: #FFF5F8;
            --white: #fff;
            --text: #2D3436;
            --text2: #636E72;
            --text3: #B2BEC3;
            --radius: 14px;
            --shadow: 0 2px 12px rgba(184, 134, 11, .06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 20px;
        }

        .nav {
            background: linear-gradient(135deg, #B8860B 0%, #D4A537 100%);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo { color: #fff; font-weight: 800; font-size: .92rem; }
        .nav-back { color: rgba(255,255,255,.85); text-decoration: none; font-size: .82rem; font-weight: 600; }

        .content { padding: 12px; max-width: 960px; margin: 0 auto; }

        /* Tab system */
        .tab-bar {
            display: flex;
            gap: 4px;
            margin-bottom: 14px;
            background: var(--white);
            border-radius: 12px;
            padding: 4px;
            box-shadow: var(--shadow);
        }
        .tab-btn {
            flex: 1;
            padding: 10px 8px;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: .78rem;
            font-weight: 700;
            cursor: pointer;
            background: transparent;
            color: var(--text2);
            transition: all .2s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #B8860B, #D4A537);
            color: #fff;
            box-shadow: 0 2px 8px rgba(232,67,147,.25);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 14px;
        }
        .stat-card {
            background: var(--white);
            border: 1.5px solid rgba(184, 134, 11, .06);
            border-radius: var(--radius);
            padding: 12px 8px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .stat-val { font-size: 1.4rem; font-weight: 800; color: var(--pink); }
        .stat-val.green { color: var(--green); }
        .stat-val.red { color: var(--red); }
        .stat-val.gold { color: var(--gold); }
        .stat-val.blue { color: var(--blue); }
        .stat-label {
            font-size: .62rem;
            color: var(--text3);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-top: 2px;
        }

        /* Filter bar */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-bar select, .filter-bar input {
            padding: 8px 12px;
            background: var(--white);
            border: 1.5px solid rgba(184, 134, 11, .1);
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: .82rem;
            color: var(--text);
        }
        .filter-btn {
            padding: 8px 14px;
            border: 1.5px solid rgba(184, 134, 11, .15);
            border-radius: 10px;
            font-weight: 700;
            font-size: .78rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            background: var(--white);
            color: var(--text);
            transition: all .2s;
        }
        .filter-btn.active {
            background: var(--pink);
            color: #fff;
            border-color: var(--pink);
        }
        .filter-bar .btn-refresh {
            padding: 8px 14px;
            background: var(--pink);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: .82rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .date-range-inputs {
            display: none;
            gap: 6px;
            align-items: center;
        }
        .date-range-inputs.show { display: flex; }

        /* Cards */
        .card {
            background: var(--white);
            border: 1.5px solid rgba(184, 134, 11, .06);
            border-radius: var(--radius);
            padding: 14px;
            box-shadow: var(--shadow);
            margin-bottom: 12px;
        }
        .section-title {
            font-size: .88rem;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .report-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(0,0,0,.04);
            font-size: .82rem;
        }
        .report-row:last-child { border-bottom: none; }
        .report-label { color: var(--text2); }
        .report-val { font-weight: 700; }

        /* Staff table */
        .staff-table { width: 100%; border-collapse: collapse; font-size: .78rem; }
        .staff-table th {
            background: var(--bg);
            padding: 8px 6px;
            text-align: left;
            font-weight: 700;
            font-size: .68rem;
            text-transform: uppercase;
            color: var(--text2);
            letter-spacing: .3px;
        }
        .staff-table td { padding: 8px 6px; border-bottom: 1px solid rgba(0,0,0,.04); }
        .staff-table tr:last-child td { border-bottom: none; }

        /* Funnel */
        .funnel-step {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .funnel-bar {
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: .72rem;
            font-weight: 700;
            color: #fff;
            min-width: 40px;
            transition: width .4s ease;
        }
        .funnel-label { font-size: .75rem; color: var(--text2); min-width: 80px; }
        .funnel-count { font-size: .72rem; font-weight: 700; color: var(--text); min-width: 30px; text-align: right; }

        /* Tags */
        .tag { font-size: .62rem; padding: 2px 8px; border-radius: 10px; font-weight: 700; display: inline-block; }
        .tag.phone-yes { background: var(--green-light); color: var(--green); }
        .tag.phone-no { background: var(--red-light); color: var(--red); }
        .tag.msg-count { background: var(--blue-light); color: var(--blue); }
        .tag.responded { background: var(--green-light); color: var(--green); }
        .tag.not-responded { background: var(--red-light); color: var(--red); }
        .tag.ad { background: var(--purple-light); color: var(--purple); }

        /* Conversation list */
        .conv-list { display: flex; flex-direction: column; gap: 8px; }
        .conv-card {
            background: var(--white);
            border: 1.5px solid rgba(184, 134, 11, .06);
            border-radius: var(--radius);
            padding: 12px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all .15s;
        }
        .conv-card:active { transform: scale(.98); }
        .conv-card.expanded { border-color: var(--pink); box-shadow: 0 0 0 3px rgba(232,67,147,.12); }

        .conv-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
        .conv-name { font-weight: 700; font-size: .85rem; }
        .conv-time { font-size: .65rem; color: var(--text3); }
        .conv-snippet {
            font-size: .78rem; color: var(--text2); line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 1; line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
        }
        .conv-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }

        /* Expanded detail */
        .conv-detail { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,.06); }
        .conv-card.expanded .conv-detail { display: block; }
        .conv-card.expanded .conv-snippet { -webkit-line-clamp: unset; line-clamp: unset; }

        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; font-size: .78rem; }
        .detail-item { display: flex; justify-content: space-between; padding: 4px 8px; background: var(--bg); border-radius: 8px; }
        .detail-label { color: var(--text2); }
        .detail-val { font-weight: 600; }

        /* Messages in expanded view */
        .msg-list { max-height: 300px; overflow-y: auto; margin: 8px 0; padding: 8px; background: var(--bg); border-radius: 10px; }
        .msg-item { margin-bottom: 6px; font-size: .78rem; line-height: 1.4; }
        .msg-item .msg-sender { font-weight: 700; font-size: .7rem; color: var(--text2); }
        .msg-item .msg-text { padding: 6px 10px; border-radius: 10px; display: inline-block; max-width: 85%; }
        .msg-item.customer .msg-text { background: var(--white); border: 1px solid rgba(0,0,0,.06); }
        .msg-item.page .msg-text { background: var(--pink); color: #fff; }
        .msg-item.page { text-align: right; }

        /* Analysis inline */
        .ai-inline {
            background: linear-gradient(135deg, rgba(232,67,147,.04), rgba(253,121,168,.04));
            border: 1px solid rgba(232,67,147,.1);
            border-radius: 10px;
            padding: 10px;
            margin-top: 8px;
        }
        .ai-inline .ai-title { font-size: .75rem; font-weight: 700; color: var(--pink); margin-bottom: 6px; }
        .ai-inline .ai-text { font-size: .78rem; color: var(--text2); line-height: 1.5; }
        .ai-action-btn {
            padding: 5px 10px;
            border: 1.5px solid rgba(232,67,147,.15);
            border-radius: 8px;
            font-size: .72rem;
            font-weight: 600;
            cursor: pointer;
            background: var(--white);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin-top: 6px;
            margin-right: 4px;
        }
        .ai-action-btn:hover { background: var(--pink-light); }
        .ai-action-btn.primary { background: var(--pink); color: #fff; border-color: var(--pink); }

        /* Report button */
        .ai-report-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #B8860B, #D4A537);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: .92rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            margin-bottom: 14px;
            transition: opacity .2s;
        }
        .ai-report-btn:disabled { opacity: .5; cursor: wait; }
        .ai-report-btn:hover:not(:disabled) { opacity: .9; }

        .ai-report-content {
            background: var(--white);
            border: 1.5px solid rgba(184, 134, 11, .1);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            font-size: .82rem;
            line-height: 1.7;
        }
        .ai-report-content h1 { font-size: 1.1rem; margin: 18px 0 8px; color: var(--pink); }
        .ai-report-content h2 { font-size: .95rem; margin: 14px 0 6px; color: var(--text); border-bottom: 2px solid var(--pink-light); padding-bottom: 4px; }
        .ai-report-content h3 { font-size: .85rem; margin: 10px 0 4px; color: var(--text2); }
        .ai-report-content ul, .ai-report-content ol { padding-left: 18px; margin: 6px 0; }
        .ai-report-content li { margin-bottom: 4px; }
        .ai-report-content strong { color: var(--text); }
        .ai-report-content code { background: var(--bg); padding: 1px 6px; border-radius: 4px; font-size: .78rem; }
        .ai-report-content blockquote { border-left: 3px solid var(--pink); padding: 6px 12px; background: var(--bg); margin: 8px 0; border-radius: 0 8px 8px 0; }
        .ai-report-content table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: .78rem; }
        .ai-report-content th { background: var(--bg); padding: 6px; text-align: left; font-weight: 700; }
        .ai-report-content td { padding: 6px; border-bottom: 1px solid rgba(0,0,0,.04); }
        .ai-report-content hr { border: none; height: 1px; background: var(--pink-light); margin: 12px 0; }

        .ai-report-meta {
            font-size: .68rem;
            color: var(--text3);
            text-align: center;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid rgba(0,0,0,.04);
        }

        /* Loading & empty */
        .loading { text-align: center; padding: 40px; color: var(--text3); }
        .loading .spinner { font-size: 2rem; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 30px; color: var(--text3); }
        .empty-state .ei { font-size: 2rem; display: block; margin-bottom: 6px; }

        /* Toast */
        .toast-c { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 6px; }
        .toast { padding: 10px 20px; border-radius: 12px; font-size: .82rem; font-weight: 600; animation: toastIn .3s ease; white-space: nowrap; }
        .toast.ok { background: var(--green); color: #fff; }
        .toast.err { background: var(--red); color: #fff; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .detail-grid { grid-template-columns: 1fr; }
        }
    </style>
    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <nav class="nav">
        <span class="nav-logo">💬 Hỗ Trợ Trực Page</span>
        <div style="display:flex;gap:8px;align-items:center">
            <a href="/" class="nav-back">← CRM</a>
            <a href="/admin" class="nav-back">⚙️ Admin</a>
        </div>
    </nav>

    <div class="content">
        <!-- Date filter -->
        <div class="filter-bar">
            <button class="filter-btn active" onclick="setDateFilter('today')" id="btn-today">Hôm nay</button>
            <button class="filter-btn" onclick="setDateFilter('yesterday')" id="btn-yesterday">Hôm qua</button>
            <button class="filter-btn" onclick="setDateFilter('custom')" id="btn-custom">Chọn ngày</button>
            <div class="date-range-inputs" id="dateRangeInputs">
                <input type="date" id="dateFrom" onchange="loadConversations()">
                <span style="font-size:.78rem;color:var(--text3)">→</span>
                <input type="date" id="dateTo" onchange="loadConversations()">
            </div>
            <select id="filterPhone" onchange="filterConvList()">
                <option value="">Tất cả</option>
                <option value="yes">✅ Có SĐT</option>
                <option value="no">❌ Chưa SĐT</option>
            </select>
            <button class="btn-refresh" onclick="loadConversations()">🔄</button>
        </div>

        <!-- Stats row -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card"><div class="stat-val" id="statConversations">-</div><div class="stat-label">Hội thoại</div></div>
            <div class="stat-card"><div class="stat-val green" id="statHasPhone">-</div><div class="stat-label">Có SĐT</div></div>
            <div class="stat-card"><div class="stat-val red" id="statNoPhone">-</div><div class="stat-label">Chưa SĐT</div></div>
            <div class="stat-card"><div class="stat-val blue" id="statAvgReply">-</div><div class="stat-label">TB phản hồi</div></div>
        </div>

        <!-- Tabs -->
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('overview')" id="tabBtnOverview">📊 Báo cáo</button>
            <button class="tab-btn" onclick="switchTab('ai')" id="tabBtnAi">📋 Đánh giá</button>
            <button class="tab-btn" onclick="switchTab('conversations')" id="tabBtnConv">💬 Hội thoại</button>
        </div>

        <!-- Tab: Overview Report -->
        <div class="tab-content active" id="tab-overview">
            <div id="overviewContent">
                <div class="loading"><span class="spinner">👑</span><br>Đang tải...</div>
            </div>
        </div>

        <!-- Tab: Đánh giá & Góp ý -->
        <div class="tab-content" id="tab-ai">
            <button class="ai-report-btn" onclick="generateAIReport()" id="aiReportBtn">
                📋 Đánh giá và góp ý chi tiết
            </button>
            <div id="aiReportStatus" style="display:none;text-align:center;padding:20px;color:var(--text2);font-size:.82rem"></div>
            <div id="aiReportResult"></div>
        </div>

        <!-- Tab: Conversations -->
        <div class="tab-content" id="tab-conversations">
            <div class="conv-list" id="convList">
                <div class="loading"><span class="spinner">👑</span><br>Đang tải hội thoại...</div>
            </div>
        </div>
    </div>

    <div class="toast-c" id="toastC"></div>

    <script>
        const token = localStorage.getItem('crm_token');
        if (!token) window.location.href = '/login';
        function headers() { return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; }

        let allConversations = [];
        let expandedConvId = null;
        let expandedMessages = {};
        let currentDateFilter = 'today';

        // ==================== DATE FILTER ====================
        function setDateFilter(mode) {
            currentDateFilter = mode;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            document.getElementById('dateRangeInputs').classList.toggle('show', mode === 'custom');
            if (mode !== 'custom') loadConversations();
        }

        // Get Vietnam (UTC+7) midnight for a given date string 'YYYY-MM-DD'
        function vnMidnight(dateStr) {
            // dateStr = 'YYYY-MM-DD', midnight Vietnam = that date 00:00 UTC+7 = previous day 17:00 UTC
            const [y, m, d] = dateStr.split('-').map(Number);
            return new Date(Date.UTC(y, m - 1, d, -7)); // UTC hour = 0 - 7 = -7 => previous day 17:00 UTC
        }

        // Get today's date string in Vietnam timezone
        function vnTodayStr() {
            return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Ho_Chi_Minh' }); // 'YYYY-MM-DD'
        }

        // Get yesterday's date string in Vietnam timezone
        function vnYesterdayStr() {
            const d = new Date(Date.now() - 86400000);
            return d.toLocaleDateString('en-CA', { timeZone: 'Asia/Ho_Chi_Minh' });
        }

        function getDateRange() {
            const todayStr = vnTodayStr();

            if (currentDateFilter === 'today') {
                const since = vnMidnight(todayStr);
                const until = new Date(since.getTime() + 86400000);
                return { since: since.toISOString(), until: until.toISOString(), label: 'Hôm nay' };
            } else if (currentDateFilter === 'yesterday') {
                const yesterdayStr = vnYesterdayStr();
                const since = vnMidnight(yesterdayStr);
                const until = vnMidnight(todayStr);
                return { since: since.toISOString(), until: until.toISOString(), label: 'Hôm qua' };
            } else {
                const from = document.getElementById('dateFrom').value;
                const to = document.getElementById('dateTo').value;
                if (!from || !to) {
                    const since = vnMidnight(todayStr);
                    const until = new Date(since.getTime() + 86400000);
                    return { since: since.toISOString(), until: until.toISOString(), label: 'Tùy chọn' };
                }
                const since = vnMidnight(from);
                const until = new Date(vnMidnight(to).getTime() + 86400000);
                return {
                    since: since.toISOString(),
                    until: until.toISOString(),
                    label: `${from} → ${to}`
                };
            }
        }

        // ==================== TAB SWITCHING ====================
        function switchTab(tabId) {
            const tabMap = { overview: 'tabBtnOverview', ai: 'tabBtnAi', conversations: 'tabBtnConv' };
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById(tabMap[tabId]);
            if (btn) btn.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            const content = document.getElementById('tab-' + tabId);
            if (content) content.classList.add('active');
        }

        // ==================== LOAD CONVERSATIONS ====================
        async function loadConversations() {
            const list = document.getElementById('convList');
            const overview = document.getElementById('overviewContent');
            list.innerHTML = '<div class="loading"><span class="spinner">👑</span><br>Đang tải...</div>';
            overview.innerHTML = '<div class="loading"><span class="spinner">👑</span><br>Đang tải...</div>';

            try {
                const range = getDateRange();
                const res = await fetch(`/api/pancake/conversations?since=${encodeURIComponent(range.since)}`, { headers: headers() });
                if (res.status === 401) { window.location.href = '/login'; return; }
                const data = await res.json();

                if (data.error) {
                    list.innerHTML = `<div class="empty-state"><span class="ei">⚠️</span><p>${data.error}</p></div>`;
                    overview.innerHTML = list.innerHTML;
                    return;
                }

                // Pancake API returns naive UTC timestamps without 'Z' suffix
                // e.g. "2026-03-13T11:27:18.798000" — browser treats as local time
                // Fix: append 'Z' so browser correctly interprets as UTC
                function fixTS(ts) {
                    if (!ts) return ts;
                    if (typeof ts === 'number') return ts; // epoch, already fine
                    ts = String(ts);
                    if (!ts.endsWith('Z') && !ts.includes('+') && !ts.includes('-', 10)) {
                        return ts + 'Z';
                    }
                    return ts;
                }
                function fixConvTimestamps(c) {
                    if (c.updated_at) c.updated_at = fixTS(c.updated_at);
                    if (c.inserted_at) c.inserted_at = fixTS(c.inserted_at);
                    if (c.tag_histories) {
                        c.tag_histories.forEach(th => { if (th.inserted_at) th.inserted_at = fixTS(th.inserted_at); });
                    }
                    return c;
                }

                // Filter by date range (until)
                const untilTime = new Date(range.until).getTime();
                const sinceTime = new Date(range.since).getTime();
                allConversations = (data.conversations || []).map(fixConvTimestamps).filter(c => {
                    const t = new Date(c.updated_at || c.inserted_at).getTime();
                    return t >= sinceTime && t < untilTime;
                });

                updateStats();
                filterConvList();
                buildOverviewReport(range.label);
                expandedMessages = {};
            } catch (e) {
                list.innerHTML = '<div class="empty-state"><span class="ei">❌</span><p>Lỗi kết nối</p></div>';
                overview.innerHTML = list.innerHTML;
                console.error(e);
            }
        }

        // ==================== STATS ====================
        function updateStats() {
            const convs = allConversations;
            document.getElementById('statConversations').textContent = convs.length;
            document.getElementById('statHasPhone').textContent = convs.filter(c => c.has_phone).length;
            document.getElementById('statNoPhone').textContent = convs.filter(c => !c.has_phone).length;

            const responseTimes = calcResponseTimes(convs);
            const avg = responseTimes.length > 0
                ? Math.round(responseTimes.reduce((a, b) => a + b, 0) / responseTimes.length)
                : 0;
            document.getElementById('statAvgReply').textContent = formatMinutes(avg);
        }

        function calcResponseTimes(convs) {
            const times = [];
            convs.forEach(c => {
                if (c.inserted_at && c.last_sent_by && c.last_sent_by.admin_name) {
                    let firstAction = c.tag_histories?.[0]?.inserted_at || c.updated_at;
                    const start = new Date(c.inserted_at).getTime();
                    const end = new Date(firstAction).getTime();
                    const diffMin = (end - start) / 60000;
                    if (diffMin > 0 && diffMin < 1440) times.push(diffMin);
                }
            });
            return times;
        }

        function formatMinutes(min) {
            if (min === 0) return '-';
            if (min < 1) return '<1p';
            if (min < 60) return Math.round(min) + 'p';
            const h = Math.floor(min / 60);
            const m = Math.round(min % 60);
            return h + 'h' + (m > 0 ? m + 'p' : '');
        }

        // ==================== OVERVIEW REPORT ====================
        function buildOverviewReport(label) {
            const convs = allConversations;
            const el = document.getElementById('overviewContent');

            if (!convs.length) {
                el.innerHTML = '<div class="empty-state"><span class="ei">📊</span><p>Chưa có dữ liệu</p></div>';
                return;
            }

            // Staff performance
            const staffMap = {};
            convs.forEach(c => {
                const staffName = c.last_sent_by?.admin_name || null;
                const key = staffName || '(Chưa phản hồi)';
                if (!staffMap[key]) staffMap[key] = { total: 0, hasPhone: 0, responseTimes: [] };
                staffMap[key].total++;
                if (c.has_phone) staffMap[key].hasPhone++;
                if (staffName && c.inserted_at) {
                    let ft = c.tag_histories?.[0]?.inserted_at || c.updated_at;
                    const diffMin = (new Date(ft).getTime() - new Date(c.inserted_at).getTime()) / 60000;
                    if (diffMin > 0 && diffMin < 1440) staffMap[key].responseTimes.push(diffMin);
                }
            });

            const staffRows = Object.entries(staffMap)
                .sort((a, b) => b[1].total - a[1].total)
                .map(([name, d]) => {
                    const avgTime = d.responseTimes.length > 0
                        ? Math.round(d.responseTimes.reduce((a, b) => a + b, 0) / d.responseTimes.length) : null;
                    const phoneRate = d.total > 0 ? ((d.hasPhone / d.total) * 100).toFixed(0) : '0';
                    const isUnresponded = name === '(Chưa phản hồi)';
                    return `<tr>
                        <td style="font-weight:600;${isUnresponded ? 'color:var(--red)' : ''}">${name}</td>
                        <td style="text-align:center;font-weight:700">${d.total}</td>
                        <td style="text-align:center;color:var(--green);font-weight:700">${d.hasPhone}</td>
                        <td style="text-align:center;color:${parseInt(phoneRate) >= 40 ? 'var(--green)' : 'var(--red)'};font-weight:700">${phoneRate}%</td>
                        <td style="text-align:center;font-weight:600;color:${avgTime && avgTime > 30 ? 'var(--red)' : 'var(--green)'}">${avgTime ? formatMinutes(avgTime) : '-'}</td>
                    </tr>`;
                }).join('');

            // Funnel
            const total = convs.length;
            const responded = convs.filter(c => c.last_sent_by?.admin_name).length;
            const hasPhone = convs.filter(c => c.has_phone).length;
            const fromAds = convs.filter(c => c.ad_ids?.length > 0).length;

            const funnelSteps = [
                { label: 'Tin nhắn đến', count: total, color: 'var(--blue)' },
                { label: 'Đã phản hồi', count: responded, color: 'var(--green)' },
                { label: 'Có SĐT', count: hasPhone, color: 'var(--gold)' },
                { label: 'Từ QC', count: fromAds, color: 'var(--purple)' },
            ];

            const funnelHTML = funnelSteps.map(s => {
                const pct = total > 0 ? Math.max(10, (s.count / total) * 100) : 10;
                const rate = total > 0 ? ((s.count / total) * 100).toFixed(0) : '0';
                return `<div class="funnel-step">
                    <span class="funnel-label">${s.label}</span>
                    <div class="funnel-bar" style="width:${pct}%;background:${s.color}">${s.count}</div>
                    <span class="funnel-count">${rate}%</span>
                </div>`;
            }).join('');

            el.innerHTML = `
                <div class="card">
                    <div class="section-title">👥 Hiệu suất nhân viên — ${label}</div>
                    <div style="overflow-x:auto">
                        <table class="staff-table">
                            <tr><th>Nhân viên</th><th style="text-align:center">Hội thoại</th><th style="text-align:center">Có SĐT</th><th style="text-align:center">Tỉ lệ SĐT</th><th style="text-align:center">TB phản hồi</th></tr>
                            ${staffRows}
                        </table>
                    </div>
                </div>
                <div class="card">
                    <div class="section-title">📈 Phễu chuyển đổi</div>
                    <div>${funnelHTML}</div>
                </div>
                <p style="text-align:center;font-size:.68rem;color:var(--text3);margin-top:8px">
                    Dữ liệu từ Pancake API · ${label} · ${new Date().toLocaleTimeString('vi-VN')}
                </p>`;
        }

        // ==================== AI DEEP REPORT ====================
        let isGeneratingReport = false;

        async function generateAIReport() {
            if (isGeneratingReport) return;
            if (!allConversations.length) {
                showToast('Chưa có dữ liệu hội thoại!', 'err');
                return;
            }

            isGeneratingReport = true;
            const btn = document.getElementById('aiReportBtn');
            const status = document.getElementById('aiReportStatus');
            const result = document.getElementById('aiReportResult');

            btn.disabled = true;
            btn.textContent = '⏳ Đang phân tích...';
            status.style.display = 'block';
            status.innerHTML = `<div class="loading"><span class="spinner">👑</span><br>
                Đang tải ${allConversations.length} cuộc hội thoại và phân tích...<br>
                <span style="font-size:.72rem;color:var(--text3)">Quá trình có thể mất 30-60 giây</span>
            </div>`;
            result.innerHTML = '';

            try {
                const res = await fetch('/api/pancake/ai-report', {
                    method: 'POST',
                    headers: headers(),
                    body: JSON.stringify({ conversations: allConversations })
                });

                const data = await res.json();
                if (data.error) throw new Error(data.error);

                // Render markdown report
                const reportHTML = marked.parse(data.report || '');
                result.innerHTML = `
                    <div class="ai-report-content">${reportHTML}</div>
                    <div class="ai-report-meta">
                        📋 Hệ thống đánh giá · ${data.totalConversations} hội thoại · ${data.conversationsWithFullChat} có đầy đủ tin nhắn
                    </div>`;

                status.style.display = 'none';
            } catch (e) {
                status.style.display = 'none';
                result.innerHTML = `<div class="empty-state"><span class="ei">❌</span><p>${e.message || 'Lỗi tạo báo cáo'}</p></div>`;
                showToast('Lỗi: ' + (e.message || 'Không thể tạo báo cáo'), 'err');
            } finally {
                isGeneratingReport = false;
                btn.disabled = false;
                btn.textContent = '📋 Đánh giá và góp ý chi tiết';
            }
        }

        // ==================== FILTER & RENDER ====================
        function filterConvList() {
            const phoneFilter = document.getElementById('filterPhone').value;
            let filtered = [...allConversations];
            if (phoneFilter === 'yes') filtered = filtered.filter(c => c.has_phone);
            if (phoneFilter === 'no') filtered = filtered.filter(c => !c.has_phone);
            renderConvList(filtered);
        }

        function renderConvList(convs) {
            const list = document.getElementById('convList');
            if (!convs.length) {
                list.innerHTML = '<div class="empty-state"><span class="ei">💬</span><p>Không có hội thoại</p></div>';
                return;
            }

            list.innerHTML = convs.map(c => {
                const name = c.from?.name || 'Khách hàng';
                const timeStr = c.updated_at ? new Date(c.updated_at).toLocaleString('vi-VN', {
                    timeZone: 'Asia/Ho_Chi_Minh', day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
                }) : '';
                const responded = c.last_sent_by?.admin_name;
                const gender = c.page_customer?.gender === 'female' ? '👩' : c.page_customer?.gender === 'male' ? '👨' : '';

                let respTimeStr = '';
                if (responded && c.inserted_at) {
                    let ft = c.tag_histories?.[0]?.inserted_at || c.updated_at;
                    const diffMin = (new Date(ft).getTime() - new Date(c.inserted_at).getTime()) / 60000;
                    if (diffMin > 0 && diffMin < 1440) respTimeStr = formatMinutes(Math.round(diffMin));
                }

                const isExpanded = expandedConvId === c.id;

                return `<div class="conv-card ${isExpanded ? 'expanded' : ''}" onclick="toggleConv('${c.id}')">
                    <div class="conv-top">
                        <span class="conv-name">${!c.seen ? '🔴 ' : ''}${gender} ${name}</span>
                        <span class="conv-time">${timeStr}</span>
                    </div>
                    <div class="conv-snippet">${c.snippet || ''}</div>
                    <div class="conv-tags">
                        <span class="tag ${c.has_phone ? 'phone-yes' : 'phone-no'}">${c.has_phone ? '✅ SĐT' : '❌ Chưa SĐT'}</span>
                        <span class="tag msg-count">💬 ${c.message_count || 0}</span>
                        ${responded ? `<span class="tag responded">✓ ${responded}</span>` : '<span class="tag not-responded">⏳ Chưa rep</span>'}
                        ${respTimeStr ? `<span class="tag" style="background:var(--blue-light);color:var(--blue)">⏱ ${respTimeStr}</span>` : ''}
                        ${c.ad_ids?.length ? '<span class="tag ad">📢 QC</span>' : ''}
                    </div>
                    <div class="conv-detail" id="detail-${c.id}">
                        ${isExpanded ? buildDetailHTML(c) : ''}
                    </div>
                </div>`;
            }).join('');
        }

        // ==================== CONVERSATION EXPAND ====================
        async function toggleConv(convId) {
            if (expandedConvId === convId) {
                expandedConvId = null;
                filterConvList();
                return;
            }

            expandedConvId = convId;
            filterConvList();

            // Load messages if not cached
            if (!expandedMessages[convId]) {
                const detailEl = document.getElementById('detail-' + convId);
                if (detailEl) {
                    const msgContainer = detailEl.querySelector('.msg-list');
                    if (msgContainer) msgContainer.innerHTML = '<div class="loading" style="padding:10px"><span class="spinner" style="font-size:1rem">👑</span> Đang tải tin nhắn...</div>';
                }

                try {
                    const res = await fetch(`/api/pancake/conversations/${convId}/messages`, { headers: headers() });
                    const data = await res.json();
                    expandedMessages[convId] = data.messages || [];
                } catch (e) {
                    expandedMessages[convId] = [];
                }

                // Also get AI analysis
                const conv = allConversations.find(c => c.id === convId);
                if (conv) {
                    try {
                        const aiRes = await fetch('/api/pancake/analyze', {
                            method: 'POST',
                            headers: headers(),
                            body: JSON.stringify({
                                customerName: conv.from?.name,
                                messages: expandedMessages[convId],
                                snippet: conv.snippet,
                                hasPhone: conv.has_phone,
                                convId: convId
                            })
                        });
                        const aiData = await aiRes.json();
                        if (aiData.analysis) {
                            conv._aiAnalysis = aiData.analysis;
                        }
                    } catch (e) { /* ignore */ }
                }

                filterConvList(); // re-render with messages
            }
        }

        function buildDetailHTML(c) {
            const msgs = expandedMessages[c.id] || [];
            const phones = (c.recent_phone_numbers || []).join(', ');
            const responded = c.last_sent_by?.admin_name || 'Chưa';
            const ai = c._aiAnalysis;

            let respTimeStr = '-';
            if (c.last_sent_by?.admin_name && c.inserted_at) {
                let ft = c.tag_histories?.[0]?.inserted_at || c.updated_at;
                const diffMin = (new Date(ft).getTime() - new Date(c.inserted_at).getTime()) / 60000;
                if (diffMin > 0 && diffMin < 1440) respTimeStr = formatMinutes(Math.round(diffMin));
            }

            // Messages HTML
            let msgsHTML = '';
            if (msgs.length > 0) {
                const pageName = 'Viện Thẩm Mỹ Quốc Tế Hoàn Mỹ';
                msgsHTML = `<div class="msg-list">${msgs.map(m => {
                    const isPage = (m.from?.name || m.from || '').includes(pageName) || (m.from?.id === '720945527779334');
                    const sender = typeof m.from === 'string' ? m.from : (m.from?.name || 'Unknown');
                    return `<div class="msg-item ${isPage ? 'page' : 'customer'}">
                        <div class="msg-sender">${sender}</div>
                        <div class="msg-text">${m.message}</div>
                    </div>`;
                }).join('')}</div>`;
            } else {
                msgsHTML = '<div style="text-align:center;font-size:.72rem;color:var(--text3);padding:8px">Đang tải tin nhắn...</div>';
            }

            // Analysis section
            let aiHTML = '';
            if (ai) {
                const scoreColor = ai.score >= 70 ? 'var(--green)' : ai.score >= 40 ? 'var(--gold)' : 'var(--red)';
                const interestEmoji = ai.interest === 'nóng' ? '🔥' : ai.interest === 'ấm' ? '🌡️' : '❄️';
                
                // Scoring grid
                let scoringHTML = '';
                if (ai.scoring) {
                    const s = ai.scoring;
                    const scoreItems = [
                        { label: 'Tốc độ PH', val: s.tocDoPhanhoi },
                        { label: 'Khai thác NC', val: s.khaiThacNhuCau },
                        { label: 'Tư vấn', val: s.kyNangTuVan },
                        { label: 'Lấy SĐT', val: s.danDatLaySo },
                        { label: 'Chốt lịch', val: s.chotLich },
                        { label: 'Follow-up', val: s.followUp },
                        { label: 'Thiện cảm', val: s.taoThienCam },
                        { label: 'Xử lý TC', val: s.xuLyTuChoi },
                        { label: 'Bám mục tiêu', val: s.bamMucTieu },
                    ];
                    scoringHTML = `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:6px">
                        ${scoreItems.map(item => {
                            const v = item.val || 0;
                            const c = v >= 70 ? 'var(--green)' : v >= 40 ? 'var(--gold)' : 'var(--red)';
                            return `<div style="background:var(--bg);padding:4px 6px;border-radius:6px;font-size:.68rem;display:flex;justify-content:space-between">
                                <span style="color:var(--text2)">${item.label}</span>
                                <span style="font-weight:700;color:${c}">${v}</span>
                            </div>`;
                        }).join('')}
                    </div>`;
                }

                aiHTML = `
                    <div class="ai-inline">
                        <div class="ai-title">📋 Đánh giá chi tiết
                            <span style="float:right;font-size:.82rem;color:${scoreColor};font-weight:800">${ai.score}/100</span>
                            <span style="float:right;margin-right:8px">${interestEmoji} ${(ai.interest||'').toUpperCase()}</span>
                        </div>
                        <div class="ai-text">${ai.summary || ''}</div>
                        ${scoringHTML}
                        ${ai.detailAnalysis ? `<div style="margin-top:6px;font-size:.75rem;color:var(--text2);line-height:1.5;padding:6px 8px;background:var(--bg);border-radius:8px">${ai.detailAnalysis}</div>` : ''}
                        ${ai.issues?.length ? `<div style="margin-top:6px"><strong style="font-size:.72rem;color:var(--red)">⚠️ Vấn đề:</strong><ul style="margin:4px 0 0 14px;font-size:.75rem;color:var(--text2)">${ai.issues.map(i => `<li>${i}</li>`).join('')}</ul></div>` : ''}
                        ${ai.suggestions?.length ? `<div style="margin-top:6px"><strong style="font-size:.72rem;color:var(--green)">💡 Gợi ý:</strong><ul style="margin:4px 0 0 14px;font-size:.75rem;color:var(--text2)">${ai.suggestions.map(s => `<li>${s}</li>`).join('')}</ul></div>` : ''}
                        ${ai.suggestedMessage ? `<div style="margin-top:6px;background:var(--green-light);padding:8px;border-radius:8px;font-size:.78rem">
                            <strong style="font-size:.7rem;color:var(--green)">📝 Tin nhắn gợi ý:</strong><br>${ai.suggestedMessage}
                            <button class="ai-action-btn primary" onclick="event.stopPropagation();navigator.clipboard.writeText('${ai.suggestedMessage.replace(/'/g, "\\'")}');showToast('Đã sao chép!','ok')" style="margin-top:4px">📋 Copy</button>
                        </div>` : ''}
                    </div>`;
            } else {
                aiHTML = '<div class="ai-inline"><div class="ai-title">📋 Đánh giá chi tiết</div><div class="loading" style="padding:8px"><span class="spinner" style="font-size:1rem">👑</span> Đang phân tích chi tiết...</div></div>';
            }

            return `
                <div class="detail-grid">
                    <div class="detail-item"><span class="detail-label">SĐT</span><span class="detail-val" style="color:${c.has_phone ? 'var(--green)' : 'var(--red)'}">${phones || 'Chưa có'}</span></div>
                    <div class="detail-item"><span class="detail-label">Phản hồi bởi</span><span class="detail-val">${responded}</span></div>
                    <div class="detail-item"><span class="detail-label">Thời gian PH</span><span class="detail-val">${respTimeStr}</span></div>
                    <div class="detail-item"><span class="detail-label">Tổng tin nhắn</span><span class="detail-val">${c.message_count || 0}</span></div>
                </div>
                ${msgsHTML}
                ${aiHTML}
            `;
        }

        // ==================== UTILS ====================
        function showToast(msg, type = 'ok') {
            const c = document.getElementById('toastC');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // ==================== INIT ====================
        // Set default dates for custom range (use Vietnam timezone)
        document.getElementById('dateFrom').value = vnTodayStr();
        document.getElementById('dateTo').value = vnTodayStr();

        loadConversations();
    </script>
</body>

</html>

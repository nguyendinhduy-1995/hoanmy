<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#9E7C0C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icons/icon-192.png">
    <title>Đăng nhập — Hoàn Mỹ CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F2F3F5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .login-box {
            background: #fff;
            border-radius: 12px;
            padding: 32px 28px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            border: 1px solid #E8EAED;
        }

        .brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-name {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #9E7C0C;
        }

        .brand-sub {
            font-size: 0.8125rem;
            color: #9AA0A6;
            margin-top: 4px;
            font-weight: 400;
        }

        .brand-line {
            width: 32px;
            height: 2px;
            background: #9E7C0C;
            margin: 12px auto 0;
            border-radius: 1px;
        }

        .field { margin-bottom: 16px; }

        .field label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 500;
            color: #5F6368;
            margin-bottom: 4px;
        }

        .field input {
            width: 100%;
            padding: 10px 12px;
            background: #F5F6F8;
            border: 1px solid #E8EAED;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            color: #1A1D21;
            transition: border-color 0.12s, box-shadow 0.12s;
        }

        .field input:focus {
            outline: none;
            border-color: #9E7C0C;
            box-shadow: 0 0 0 2px rgba(158, 124, 12, 0.08);
            background: #fff;
        }

        .field input::placeholder { color: #9AA0A6; }

        .login-btn {
            width: 100%;
            padding: 10px;
            background: #9E7C0C;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 4px;
        }

        .login-btn:hover { background: #8A6D0A; }
        .login-btn:active { transform: scale(0.99); }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .error-msg {
            display: none;
            background: #FCE8E6;
            color: #D93025;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.8125rem;
            font-weight: 500;
            text-align: center;
            margin-bottom: 12px;
        }

        .error-msg.show {
            display: block;
            animation: shake 0.2s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
    </style>
</head>

<body>
    <div class="login-box">
        <div class="brand">
            <div class="brand-name">HOÀN MỸ</div>
            <div class="brand-sub">CRM Quản lý</div>
            <div class="brand-line"></div>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <form id="loginForm" novalidate>
            <div class="field">
                <label>Tài khoản</label>
                <input type="text" id="username" placeholder="Nhập username" autocomplete="username" required autofocus>
            </div>
            <div class="field">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu" autocomplete="current-password" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Đăng nhập</button>
        </form>
    </div>

    <script>
        const token = localStorage.getItem('crm_token');
        if (token) {
            fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token } })
                .then(r => { if (r.ok) window.location.href = '/'; });
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.textContent = 'Đang đăng nhập...';
            err.classList.remove('show');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value.trim(),
                        password: document.getElementById('password').value
                    })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                localStorage.setItem('crm_token', data.token);
                localStorage.setItem('crm_user', JSON.stringify(data.user));
                window.location.href = '/';
            } catch (error) {
                err.textContent = error.message;
                err.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Đăng nhập';
            }
        });
    </script>
</body>

</html>
